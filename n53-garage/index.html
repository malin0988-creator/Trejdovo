<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#ff6b1a" />
    <meta name="description" content="Asystent diagnostyki samochodowej BMW N53/N54" />

    <!-- PWA / mobile -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="N53 Garage" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Google Fonts — Orbitron (headers) + Inter (body) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <title>N53 Garage</title>

    <style>
      /* Reset + global base — tematyczne CSS-variables żyją w App.jsx / index.css */
      *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
      html { height: 100%; }
      body {
        height: 100%;
        background: #0a0a0f;
        color: #e8e8f0;
        font-family: 'Inter', sans-serif;
        -webkit-tap-highlight-color: transparent;
        overflow-x: hidden;
      }
      #root { height: 100%; }

      /* Splash — widoczny dopóki React się nie załaduje */
      #splash {
        position: fixed; inset: 0;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        background: #0a0a0f;
        z-index: 9999;
        transition: opacity 0.4s ease;
      }
      #splash.hidden { opacity: 0; pointer-events: none; }
      #splash-logo {
        font-family: 'Orbitron', sans-serif;
        font-size: 26px; font-weight: 900;
        letter-spacing: 4px;
        color: #ff6b1a;
        text-shadow: 0 0 30px rgba(255,107,26,0.5);
      }
      #splash-sub {
        font-family: 'Inter', sans-serif;
        font-size: 11px; letter-spacing: 3px;
        color: #555; margin-top: 8px;
        text-transform: uppercase;
      }
      #splash-bar {
        width: 160px; height: 2px;
        background: #1a1a2e; border-radius: 2px;
        margin-top: 28px; overflow: hidden;
      }
      #splash-bar::after {
        content: '';
        display: block; height: 100%;
        width: 40%; background: #ff6b1a;
        border-radius: 2px;
        animation: load 1.2s ease-in-out infinite alternate;
      }
      @keyframes load {
        from { transform: translateX(-100%); }
        to   { transform: translateX(300%); }
      }
    </style>
  </head>
  <body>
    <!-- Splash screen — chowa się gdy React zamontuje #root -->
    <div id="splash">
      <div id="splash-logo">N53 GARAGE</div>
      <div id="splash-sub">Diagnostyka / AI / Workshop</div>
      <div id="splash-bar"></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
